name: Build and Deploy to Render

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ทำการประกอบร่างตู้คอนเทนเนอร์แล้วดันขึ้น Docker Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # อย่าลืมเปลี่ยนชื่อแท็กด้านล่างให้ตรงกับสไตล์โปรเจกต์คุณน้า
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/node-localstorage-app:latest

      # ขั้นตอนส่งสัญญาณกระตุ้นเตือนให้เว็บ Render ตื่นขึ้นมาดาวน์โหลดตู้เวอร์ชันใหม่ไปติดตั้งทันที!
      - name: Trigger Render Deploy Hook
        run: |
          echo "Triggering deploy to Render..."
          curl -X GET "${{ secrets.RENDER_DEPLOY_HOOK }}"
